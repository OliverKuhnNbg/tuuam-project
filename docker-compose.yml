services:
  postgres:
    image: postgres:15-alpine
    container_name: tuuam-postgres
    environment:
      POSTGRES_DB: tuuam_db
      POSTGRES_USER: tuuam_user
      POSTGRES_PASSWORD: secret_tuuam_password
    ports:
      - "5432:5432"
    volumes:
      # Persist database state across container restarts
      - ./docker/postgres-data:/var/lib/postgresql/data
    networks:
      - tuuam-net
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: tuuam-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tuuam.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - tuuam-net
    restart: unless-stopped

networks:
  tuuam-net:
    name: tuuam-net
    driver: bridge
